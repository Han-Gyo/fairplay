name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 소스 코드 가져오기
      uses: actions/checkout@v3

    - name: JDK 17 설치
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Maven 빌드
      run: mvn clean package -DskipTests

    - name: 도커 허브 로그인
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 도커 이미지 빌드 및 푸시
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/fairplay-app:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/fairplay-app:latest

    - name: AWS 서버 접속 및 배포
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/FairPlay
          # 기존 컨테이너를 확실히 정리하여 이름 충돌 및 포트 꼬임을 방지합니다.
          docker-compose down
          # 최신 이미지를 다시 받아옵니다.
          docker-compose pull
          # 새 컨테이너를 실행합니다.
          docker-compose up -d
          # 쓰지 않는 이전 빌드 이미지들을 삭제하여 용량을 확보합니다.
          docker image prune -f
